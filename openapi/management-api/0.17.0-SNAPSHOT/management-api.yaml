servers:
- url: /
paths:
  /v5alpha/participants/{participantContextId}/catalog/request:
    post:
      tags:
      - Catalog v5alpha
      operationId: requestCatalogV4
      parameters:
      - name: participantContextId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/catalog-request-schema"
      responses:
        default:
          description: Gets contract offers (=catalog) of a single connector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/catalog-schema"
  /v5alpha/participants/{participantContextId}/catalog/dataset/request:
    post:
      tags:
      - Catalog v5alpha
      operationId: getDatasetV4
      parameters:
      - name: participantContextId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/catalog-request-schema"
      responses:
        default:
          description: Gets single dataset from a connector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dataset-schema"
